<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReUnfold-Square</title>
<style>
:root{
  --bg:#0a1622; --bg2:#0f2136; --bg3:#123049;
  --panel:rgba(255,255,255,.045);
  --panel-brd:rgba(120,170,220,.18);
  --accent:#4ea3ff; --accent2:#79d0ff; --gold:#ffcf6b;
  --ok:#4fd18b; --warn:#ffb454; --cond:#8aa0b8; --empty:#e5789b;
  --txt:#eaf2fb; --muted:#9db2c9;
  --shadow:0 20px 60px rgba(0,0,0,.5);
  --font:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;
  --mono:'Consolas','SF Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font); color:var(--txt); overflow:hidden;
  background:
    radial-gradient(1100px 760px at 82% -8%, rgba(78,163,255,.20), transparent 58%),
    radial-gradient(820px 620px at -5% 108%, rgba(121,208,255,.12), transparent 55%),
    linear-gradient(155deg,var(--bg),var(--bg2) 55%,var(--bg3));
}
#bgfx{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
#bgfx b{position:absolute;border-radius:50%;filter:blur(70px);opacity:.5;
  background:radial-gradient(circle at 30% 30%,var(--accent),transparent 70%);animation:drift 22s ease-in-out infinite}
#bgfx b:nth-child(1){width:520px;height:520px;top:-120px;right:-80px}
#bgfx b:nth-child(2){width:440px;height:440px;bottom:-160px;left:-100px;
  background:radial-gradient(circle at 30% 30%,#2f7fd6,transparent 70%);animation-duration:28s;animation-delay:-6s}
#bgfx b:nth-child(3){width:320px;height:320px;top:40%;left:55%;opacity:.22;
  background:radial-gradient(circle at 30% 30%,var(--accent2),transparent 70%);animation-duration:32s;animation-delay:-12s}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(60px,-40px) scale(1.08)}66%{transform:translate(-40px,50px) scale(.95)}}
#grid{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.05;
  background-image:linear-gradient(var(--accent) 1px,transparent 1px),linear-gradient(90deg,var(--accent) 1px,transparent 1px);
  background-size:52px 52px;mask-image:radial-gradient(ellipse at center,#000 40%,transparent 85%)}

#deck{position:fixed;inset:0;z-index:1}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;
  padding:6vh 6vw 9vh;opacity:0;visibility:hidden;transform:translateY(22px) scale(.986);
  transition:opacity .55s ease, transform .55s ease, visibility .55s;overflow:auto}
.slide.active{opacity:1;visibility:visible;transform:none;z-index:2}
.slide.active .reveal{animation:rise .65s cubic-bezier(.2,.7,.2,1) both}
.slide.active .reveal:nth-child(1){animation-delay:.04s}
.slide.active .reveal:nth-child(2){animation-delay:.12s}
.slide.active .reveal:nth-child(3){animation-delay:.20s}
.slide.active .reveal:nth-child(4){animation-delay:.28s}
.slide.active .reveal:nth-child(5){animation-delay:.36s}
.slide.active .reveal:nth-child(6){animation-delay:.44s}
@keyframes rise{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}

h1,h2,h3{line-height:1.1;font-weight:700}
.kicker{color:var(--accent2);letter-spacing:.22em;text-transform:uppercase;font-size:clamp(11px,1.05vw,14px);font-weight:600;margin-bottom:12px}
.slide h2{font-size:clamp(25px,3.8vw,50px);margin-bottom:10px;background:linear-gradient(90deg,#fff,#bcd2e8);-webkit-background-clip:text;background-clip:text;color:transparent}
.lead{font-size:clamp(15px,1.6vw,21px);color:var(--muted);max-width:60ch;line-height:1.5}
.slide p{line-height:1.5}
.mono{font-family:var(--mono)}

.title-wrap{display:grid;grid-template-columns:1.05fr .95fr;gap:4vw;align-items:center;height:100%}
.brand{font-size:clamp(42px,7.2vw,104px);font-weight:800;letter-spacing:-.02em;line-height:.96}
.brand .sq{color:var(--accent);text-shadow:0 0 40px rgba(78,163,255,.4)}
.title-sub{margin-top:16px;font-size:clamp(17px,1.9vw,27px);color:var(--gold);font-weight:600}
.title-tag{margin-top:10px;font-size:clamp(13px,1.35vw,17px);color:var(--muted)}
.title-badges{display:flex;gap:10px;margin-top:22px;flex-wrap:wrap}
.tb{background:var(--panel);border:1px solid var(--panel-brd);border-radius:999px;padding:8px 15px;font-size:clamp(12px,1.2vw,15px);color:var(--txt)}
.tb b{color:var(--accent2)}
.hero-img{border-radius:22px;overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--panel-brd);background:#0a1420;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;position:relative}
.hero-img img{width:100%;height:100%;object-fit:cover}
.hero-img::after{content:"";position:absolute;inset:0;box-shadow:inset 0 0 120px rgba(0,0,0,.35)}
.float{animation:float 6s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

.two{display:grid;grid-template-columns:1fr 1fr;gap:3vw;align-items:center;height:100%}
.imgcard{border-radius:18px;overflow:hidden;border:1px solid var(--panel-brd);box-shadow:var(--shadow);background:#0a1420}
.imgcard img{width:100%;display:block}
.imgcard.contain{background:#0e1c2c;display:flex;align-items:center;justify-content:center}
.imgcard.contain img{object-fit:contain;max-height:78vh}

.cards{display:grid;gap:16px;margin-top:10px}
.card{background:var(--panel);border:1px solid var(--panel-brd);border-radius:16px;padding:20px 22px;backdrop-filter:blur(6px)}
.card h3{font-size:clamp(16px,1.55vw,21px);margin-bottom:6px;color:#fff}
.card p{color:var(--muted);font-size:clamp(13px,1.2vw,16px)}
.card .ic{font-size:24px;margin-bottom:8px;display:block}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:12px}
.stat{background:var(--panel);border:1px solid var(--panel-brd);border-radius:18px;padding:24px 16px;text-align:center;position:relative;overflow:hidden}
.stat::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.stat .num{font-size:clamp(28px,4.2vw,54px);font-weight:800;background:linear-gradient(90deg,var(--accent2),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent}
.stat .lbl{color:var(--muted);margin-top:6px;font-size:clamp(12px,1.1vw,15px)}

.bar-wrap{margin-top:22px;max-width:820px}
.bar-row{display:flex;justify-content:space-between;color:var(--muted);font-size:14px;margin-bottom:8px}
.bar{height:26px;border-radius:13px;background:rgba(255,255,255,.06);overflow:hidden;border:1px solid var(--panel-brd);display:flex}
.bar > span{display:block;height:100%;width:0;transition:width 1.3s cubic-bezier(.2,.7,.2,1)}
.slide.active .bar .seg1{width:var(--w1);background:linear-gradient(90deg,#3f8fe0,#4ea3ff)}
.slide.active .bar .seg2{width:var(--w2);background:repeating-linear-gradient(45deg,#ffb454,#ffb454 6px,#e6a34c 6px,#e6a34c 12px)}
.legend{display:flex;gap:18px;margin-top:12px;flex-wrap:wrap;color:var(--muted);font-size:13px}
.legend i{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:6px;vertical-align:-1px}

.catalog-full{border-radius:18px;overflow:hidden;border:1px solid var(--panel-brd);box-shadow:var(--shadow);max-height:80vh;display:flex;justify-content:center;background:#0e1c2c}
.catalog-full img{width:auto;max-width:100%;max-height:80vh;display:block}

.method{display:grid;grid-template-columns:1fr 1fr;gap:3vw;align-items:center;height:100%}
.formula-box{background:rgba(10,20,32,.6);border:1px solid var(--panel-brd);border-radius:14px;padding:18px 20px;margin-top:16px;font-family:var(--mono);font-size:clamp(13px,1.35vw,17px);color:var(--accent2);line-height:1.7}
.formula-box .lbl{color:var(--muted);font-family:var(--font);font-size:13px;display:block;margin-bottom:4px}

.two-layer{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:16px}
.layer{background:var(--panel);border:1px solid var(--panel-brd);border-radius:16px;padding:22px}
.layer .tag{display:inline-block;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 12px;border-radius:999px;margin-bottom:12px}
.layer.clean .tag{background:rgba(78,163,255,.16);color:var(--accent2);border:1px solid rgba(78,163,255,.35)}
.layer.full .tag{background:rgba(255,207,107,.16);color:var(--gold);border:1px solid rgba(255,207,107,.4)}
.layer h3{color:#fff;font-size:clamp(17px,1.7vw,23px);margin-bottom:8px}
.layer p{color:var(--muted);font-size:clamp(13px,1.15vw,15px);line-height:1.5}
.layer .val{color:var(--ok);font-weight:700;margin-top:10px;font-size:15px;font-family:var(--mono)}
.layer ul{list-style:none;margin-top:10px}
.layer ul li{color:var(--muted);font-size:13px;padding:4px 0 4px 18px;position:relative;font-family:var(--mono)}
.layer ul li::before{content:"+";position:absolute;left:0;color:var(--gold);font-weight:700}

.acc-table{width:100%;border-collapse:collapse;margin-top:12px;font-size:clamp(12px,1.15vw,15px)}
.acc-table th,.acc-table td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--panel-brd)}
.acc-table th{color:var(--accent2);font-weight:600;letter-spacing:.03em}
.acc-table td .code{color:var(--accent2);font-weight:700;font-family:var(--mono)}
.acc-table .dev{color:var(--ok);font-weight:700;font-family:var(--mono)}
.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600}
.badge.ok{background:rgba(79,209,139,.16);color:var(--ok);border:1px solid rgba(79,209,139,.35)}
.badge.part{background:rgba(255,180,84,.16);color:var(--warn);border:1px solid rgba(255,180,84,.35)}
.badge.cond{background:rgba(138,160,184,.16);color:var(--cond);border:1px solid rgba(138,160,184,.35)}

ul.check{list-style:none;margin-top:12px}
ul.check li{padding:8px 0 8px 32px;position:relative;color:var(--txt);font-size:clamp(14px,1.35vw,18px);line-height:1.4}
ul.check li::before{content:"✓";position:absolute;left:0;top:7px;color:var(--ok);font-weight:800;background:rgba(79,209,139,.14);width:23px;height:23px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;border:1px solid rgba(79,209,139,.35)}

.reg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:12px}
.reg-card{background:var(--panel);border:1px solid var(--panel-brd);border-radius:14px;overflow:hidden;transition:transform .3s,border-color .3s;display:flex;flex-direction:column}
.reg-card:hover{transform:translateY(-5px);border-color:var(--accent)}
.reg-ph{aspect-ratio:4/3;background:#e9ecef;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.reg-ph img{width:100%;height:100%;object-fit:contain;padding:6px}
.reg-ph.dev{background:repeating-linear-gradient(45deg,#0e1c2c,#0e1c2c 10px,#132638 10px,#132638 20px)}
.reg-ph.dev span{color:var(--muted);font-size:12px;font-weight:600;text-align:center;padding:8px}
.reg-body{padding:11px 13px;flex:1;display:flex;flex-direction:column;gap:3px}
.reg-code{color:var(--accent2);font-size:13px;font-weight:700;font-family:var(--mono)}
.reg-name{color:var(--txt);font-size:13px;line-height:1.25}
.reg-formula{color:var(--muted);font-size:11px;font-family:var(--mono);margin-top:2px}
.reg-status{margin-top:auto;padding-top:6px}

.draft-table-wrap{margin-top:12px;max-height:66vh;overflow-y:auto;border:1px solid var(--panel-brd);border-radius:14px}
.draft-table{width:100%;border-collapse:collapse;font-size:clamp(11px,1.05vw,14px)}
.draft-table th{position:sticky;top:0;background:#0f2136;color:var(--accent2);font-weight:600;text-align:left;padding:10px 14px;border-bottom:1px solid var(--panel-brd);z-index:1}
.draft-table td{padding:8px 14px;border-bottom:1px solid rgba(120,170,220,.08);color:var(--txt)}
.draft-table tr:hover td{background:rgba(78,163,255,.06)}
.draft-table .dc{color:var(--accent2);font-family:var(--mono);font-weight:700;white-space:nowrap}
.draft-table .df{font-family:var(--mono);color:var(--muted);font-size:.92em}
.draft-table .ds{color:var(--cond);font-size:.9em;white-space:nowrap}
.draft-table .db{display:inline-block;padding:2px 8px;border-radius:999px;background:rgba(138,160,184,.16);color:var(--cond);border:1px solid rgba(138,160,184,.3);font-size:11px}

.pill-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px}
.pill{background:var(--panel);border:1px solid var(--panel-brd);border-radius:999px;padding:9px 16px;font-size:clamp(13px,1.25vw,16px);color:var(--txt)}
.pill b{color:var(--accent2)}

.plan-days{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:16px}
.day{background:var(--panel);border:1px solid var(--panel-brd);border-radius:14px;padding:18px}
.day .d{color:var(--gold);font-weight:700;font-size:14px;letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
.day p{color:var(--muted);font-size:14px;line-height:1.45}
.day.done .d{color:var(--ok)}

.finale{text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%}
.finale h2{font-size:clamp(30px,5vw,64px)}
.finale .joke{margin-top:16px;font-size:clamp(18px,2.2vw,30px);color:var(--gold);font-weight:600}
.finale .sub{margin-top:14px;color:var(--muted);max-width:62ch;font-size:clamp(15px,1.45vw,20px)}

#chrome{position:fixed;inset:0;pointer-events:none;z-index:50}
.topbar{position:absolute;top:0;left:0;right:0;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;pointer-events:auto}
.logo-min{font-weight:800;font-size:17px;color:#fff;opacity:.9}
.logo-min .sq{color:var(--accent)}
.controls{display:flex;align-items:center;gap:10px}
.btn{pointer-events:auto;cursor:pointer;user-select:none;border:1px solid var(--panel-brd);background:rgba(255,255,255,.06);color:var(--txt);border-radius:10px;padding:8px 12px;font-size:13px;font-weight:600;transition:.2s;backdrop-filter:blur(6px)}
.btn:hover{background:rgba(78,163,255,.2);border-color:var(--accent)}
.btn.active{background:var(--accent);color:#06121f;border-color:var(--accent)}
.lang{display:flex;border:1px solid var(--panel-brd);border-radius:10px;overflow:hidden}
.lang span{padding:8px 12px;cursor:pointer;font-size:13px;font-weight:700;color:var(--muted);transition:.2s}
.lang span.on{background:var(--accent);color:#06121f}
.nav-arrow{position:absolute;top:50%;transform:translateY(-50%);pointer-events:auto;cursor:pointer;width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.06);border:1px solid var(--panel-brd);color:#fff;font-size:22px;transition:.2s;backdrop-filter:blur(6px)}
.nav-arrow:hover{background:var(--accent);color:#06121f;border-color:var(--accent)}
#prev{left:18px}#next{right:18px}
.dots{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:9px;pointer-events:auto}
.dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.22);cursor:pointer;transition:.3s}
.dot.on{background:var(--accent);transform:scale(1.3);box-shadow:0 0 12px var(--accent)}
.autobar{position:absolute;bottom:0;left:0;height:3px;background:var(--accent);width:0}
.autobar.run{transition:width linear}
.counter{position:absolute;bottom:22px;right:24px;color:var(--muted);font-size:13px;pointer-events:auto;font-variant-numeric:tabular-nums}

@media (max-width:920px){
  .title-wrap,.two,.method,.two-layer{grid-template-columns:1fr;gap:22px}
  .stats,.reg-grid{grid-template-columns:repeat(2,1fr)}
  .plan-days{grid-template-columns:1fr}
  .slide{padding:8vh 5vw 11vh}
  .hero-img{aspect-ratio:16/11}
}
</style>
</head>
<body>
<div id="bgfx"><b></b><b></b><b></b></div>
<div id="grid"></div>
<div id="deck"></div>
<div id="chrome">
  <div class="topbar">
    <div class="logo-min">ReUnfold<span class="sq">-Square</span></div>
    <div class="controls">
      <div class="btn" id="autoBtn"><span id="autoIc">▶</span> <span data-i18n="auto">Авто</span></div>
      <div class="lang"><span data-lang="uk" class="on">UA</span><span data-lang="ru">RU</span></div>
    </div>
  </div>
  <div class="nav-arrow" id="prev">‹</div>
  <div class="nav-arrow" id="next">›</div>
  <div class="dots" id="dots"></div>
  <div class="counter" id="counter"></div>
  <div class="autobar" id="autobar"></div>
</div>
<script>
const IMG='renders/';
const DRAFT=[["KRG-007","Заглушка кругла","π·D·H/1e6 + π·D²/4/1e6","методичка"],["KRG-008","Врізка кругла","(π·D + S2)·(H+Z)/1e6","методичка"],["KRG-009","Сідло","Sврезка + Sседло","методичка"],["KRG-010","Ніпель круглий","(π·D + S1)·L/1e6","геометрія"],["KRG-011","Шумоглушник круглий","Σ цилиндров + фланцы/ниппели","методичка"],["KRG-012","Парасоля кругла","Sдержатель + Sконус","методичка"],["KRG-013","Дросель круглий","π·D·L/1e6 + Sлопатки","методичка"],["KRG-014","Фланець круглий","π·(Dout²-Din²)/4/1e6","методичка"],["KRG-015","Хрестовина кругла","KRG-005 + доп.врезка","геометрія"],["KRG-016","Качка кругла","как KRG-002 + патрубок","геометрія"],["KRG-017","Зворотний клапан кр.","π·D·L/1e6 + Sлопаток","геометрія"],["KRG-018","Дефлектор","Sпереход + Sцилиндр + Sзонт","табл. Одеса"],["KRG-019","Муфта","(π·D + S1)·L/1e6","геометрія"],["PRM-002","Відвід прямокутний","Σ деталей + S1 замки","СПВА"],["PRM-003","Коліно перех. прям.","PRM-002 + PRM-004","геометрія"],["PRM-004","Перехід прямокутний","Σ панелей + замки","Excel/CAMduct"],["PRM-005","Трійник прямокутний","Sтело + Sврезка","СПВА"],["PRM-006","Хрестовина прям.","PRM-005 + доп.сечение","геометрія"],["PRM-007","Качка прямокутна","Σ панели + замки","СПВА"],["PRM-008","Заглушка прям.","W·H/1e6 + борта","СПВА"],["PRM-009","Врізка прям.","(2·(a+Hв)+15·N)·(Hв+Z)/1e6","СПВА"],["PRM-010","Повітровід з врізкою","Sосн − ΣSотв + ΣSврезки","геометрія"],["PRM-011","Шумоглушник прям.","Sкорпус + элементы","геометрія"],["PRM-012","Парасоля прям.","Sстойка + Sзонт","СПВА"],["PRM-013","Дросель прямий","2·(W+H)·L/1e6 + Sлопатки","геометрія"],["KMB-001","Перехід круг-прямок.","Σ панелей + обечайка + замки","Excel/CAMduct"],["KMB-002","Сідло з прям. врізкою","Sкругл.тело + Sпрям.врезка","геометрія"],["KMB-003","Трійник круг-прямок.","Sкругл.тело + Sпрям.врезка","геометрія"],["KMB-004","Трійник прямок-круг","Sчистовая + подтверждённые припуски/замк","геометрія"],["KMB-005","Адаптер круглий","Sчистовая + подтверждённые припуски/зиг/","геометрія"],["KMB-006","Адаптер прямок.","Sчистовая + подтверждённые припуски/соед","геометрія"],["KMB-007","Жировловлювач","Sчистовая + подтверждённые припуски/соед","геометрія"]];
const SLIDES=[
(t)=>`
<div class="title-wrap">
  <div>
    <div class="reveal kicker">${t.k_title}</div>
    <div class="reveal brand">ReUnfold<span class="sq">-Square</span></div>
    <div class="reveal title-sub">${t.t_sub}</div>
    <div class="reveal title-tag">${t.t_tag}</div>
    <div class="reveal title-badges">
      <div class="tb"><b>18/48</b> ${t.tb_ready}</div>
      <div class="tb"><b>306</b> ${t.tb_tests}</div>
      <div class="tb"><b>&lt;0.04%</b> ${t.tb_dev}</div>
    </div>

let lang='uk',idx=0,auto=false,autoTimer=null;
const AUTO_MS=9000;
const deckEl=document.getElementById('deck'),dotsEl=document.getElementById('dots'),
  counter=document.getElementById('counter'),autobar=document.getElementById('autobar');
function render(){
  const t=I18N[lang];deckEl.innerHTML='';
  SLIDES.forEach((fn,i)=>{
    const s=document.createElement('section');
    s.className='slide'+(i===idx?' active':'');
    s.innerHTML=fn(t).replace(/\\n/g,'<br>');
    deckEl.appendChild(s);
  });
  buildDots();updateCounter();
  document.querySelectorAll('[data-i18n="auto"]').forEach(e=>e.textContent=t.auto);
}
function buildDots(){dotsEl.innerHTML='';SLIDES.forEach((_,i)=>{const d=document.createElement('div');d.className='dot'+(i===idx?' on':'');d.onclick=()=>go(i);dotsEl.appendChild(d);});}
function updateCounter(){counter.textContent=String(idx+1).padStart(2,'0')+' / '+String(SLIDES.length).padStart(2,'0');}
function setActive(){deckEl.querySelectorAll('.slide').forEach((s,i)=>s.classList.toggle('active',i===idx));document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('on',i===idx));updateCounter();}
function go(i){if(i<0)i=SLIDES.length-1;if(i>=SLIDES.length)i=0;idx=i;setActive();if(auto)restartAuto();}
function next(){go(idx+1)}function prev(){go(idx-1)}
function restartAuto(){clearTimeout(autoTimer);autobar.classList.remove('run');autobar.style.width='0';void autobar.offsetWidth;autobar.classList.add('run');autobar.style.transitionDuration=AUTO_MS+'ms';autobar.style.width='100%';autoTimer=setTimeout(()=>{if(idx===SLIDES.length-1){toggleAuto(false);}else next();},AUTO_MS);}
function toggleAuto(on){auto=(on===undefined)?!auto:on;const b=document.getElementById('autoBtn'),ic=document.getElementById('autoIc');b.classList.toggle('active',auto);ic.textContent=auto?'❚❚':'▶';if(auto)restartAuto();else{clearTimeout(autoTimer);autobar.classList.remove('run');autobar.style.width='0';}}
function setLang(l){if(l===lang)return;lang=l;document.querySelectorAll('.lang span').forEach(s=>s.classList.toggle('on',s.dataset.lang===l));document.documentElement.lang=l;const c=idx;render();idx=c;setActive();}
document.getElementById('next').onclick=next;
document.getElementById('prev').onclick=prev;
document.getElementById('autoBtn').onclick=()=>toggleAuto();
document.querySelectorAll('.lang span').forEach(s=>s.onclick=()=>setLang(s.dataset.lang));
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){e.preventDefault();next();}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();prev();}
  else if(e.key==='Home')go(0);else if(e.key==='End')go(SLIDES.length-1);
  else if(e.key.toLowerCase()==='a')toggleAuto();
  else if(e.key==='1')setLang('uk');else if(e.key==='2')setLang('ru');
});
let tx=0;
deckEl.addEventListener('touchstart',e=>tx=e.touches[0].clientX,{passive:true});
deckEl.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50){dx<0?next():prev();}},{passive:true});
render();
</script>
